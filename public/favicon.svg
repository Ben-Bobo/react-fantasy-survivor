<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Survivor orange background -->
  <rect width="64" height="64" rx="12" fill="#FF7700"/>

  <!-- Face -->
  <ellipse cx="32" cy="41" rx="21" ry="20" fill="#FABB91"/>

  <!-- Ears -->
  <ellipse cx="11" cy="41" rx="4" ry="5" fill="#FABB91"/>
  <ellipse cx="53" cy="41" rx="4" ry="5" fill="#FABB91"/>
  <ellipse cx="11" cy="41" rx="2.2" ry="3" fill="#E8956A"/>
  <ellipse cx="53" cy="41" rx="2.2" ry="3" fill="#E8956A"/>

  <!-- Backward baseball cap crown -->
  <path d="M11 28 Q11 10 32 10 Q53 10 53 28 Z" fill="#1C3D6E"/>
  <!-- Cap brim sticking out the back (right side for turned-around cap) -->
  <rect x="46" y="22" width="13" height="5" rx="2.5" fill="#152E58"/>
  <!-- Cap band across forehead -->
  <rect x="11" y="24" width="42" height="7" rx="2" fill="#152E58"/>
  <!-- Cap button on top -->
  <circle cx="32" cy="12" r="2.2" fill="#152E58"/>

  <!-- Eyebrows — left raised, right flat = classic smug look -->
  <path d="M19 31 Q24 27 29 30" stroke="#7B4A28" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M35 30 Q40 28 45 30" stroke="#7B4A28" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Eyes -->
  <ellipse cx="24" cy="38" rx="5" ry="5" fill="white"/>
  <circle cx="25.5" cy="39" r="3.2" fill="#2052A0"/>
  <circle cx="26.5" cy="38" r="1.3" fill="black"/>

  <ellipse cx="40" cy="38" rx="5" ry="5" fill="white"/>
  <circle cx="41.5" cy="39" r="3.2" fill="#2052A0"/>
  <circle cx="42.5" cy="38" r="1.3" fill="black"/>

  <!-- Nose -->
  <ellipse cx="32" cy="45" rx="3" ry="2" fill="#E8956A"/>

  <!-- Big toothy grin / smirk -->
  <path d="M19 51 Q32 64 45 51" fill="#8B1A1A"/>
  <path d="M19 51 Q32 58 45 51" fill="white"/>

  <!-- Laugh-line dimples -->
  <path d="M17 49 Q16 53 17.5 56" stroke="#D4956A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M47 49 Q48 53 46.5 56" stroke="#D4956A" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Mini torch icon bottom-right corner (his trademark) -->
  <rect x="52" y="50" width="4" height="10" rx="1" fill="#7B4A28"/>
  <ellipse cx="54" cy="50" rx="4" ry="3" fill="#FF4400"/>
  <ellipse cx="54" cy="49" rx="2.5" ry="2" fill="#FFAA00"/>
  <ellipse cx="54" cy="48" rx="1.2" ry="1.2" fill="#FFEE55"/>
</svg>
